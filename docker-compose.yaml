version: "3.9"
services:
  db:
    image: postgres:16-alpine
    container_name: cms-fastapi-fastmcp-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-fastapidb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cms-network

networks:
  cms-network:
    driver: bridge

volumes:
  postgres_data:
